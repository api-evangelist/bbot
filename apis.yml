aid: bbot
name: Bbot
description: >-
  Bbot is an order-and-pay solution for the hospitality industry, letting guests
  scan a QR code to view menus, order, and pay from their phones, including
  placing orders with a server on the same tab. Bbot was acquired by DoorDash
  and is now offered as Tableside Order & Pay by DoorDash, serving restaurants,
  bars, breweries, and hotels with on-premise digital ordering and payment, plus
  POS integrations such as Toast. Bbot operates owner and admin web portals but
  does not publish a standalone public or partner-facing developer API or
  documentation portal, so no API products are listed here.
